# Loan terms: SA Minerals Capital -> EMS (investment layer).
# Source: "SA Minerals - EMS Loan Agreement" (Term Loan Facility Agreement).
# Store in 01_SA_Minerals/Agreements/. Update on SARB repo change or when addenda are signed.

facility:
  creditor: "SA Minerals Capital (Pty) Ltd"
  borrower: "Engineered Mining Solutions (Pty) Ltd"   # EMS
  max_facility_zar: 110000000        # ZAR 110,000,000 committed
  currency: ZAR
  permitted_purpose: "Discharge existing claims of EMS creditors (per Drawdown Request)"
  drawdown: "In tranches on written Drawdown Request"
  maturity_months: 12               # 12 months from agreement date
  security: "Security over all of the Borrower's assets (cession of security)"

interest:
  base: "SARB repo rate"
  base_rate_pct: 7.00               # repo as of 4 June 2026
  base_effective: 2026-06-04
  margin_bps: 100                   # +100 basis points
  all_in_rate_pct: 8.00             # effective rate = repo + 1.00%
  reset: "First day of the month following any SARB repo change"
  default_rate_pct: 13.00           # Interest Rate + 5%
  day_count: "Official rate of interest (SARS), accrued on actual days"

# For the dashboard:
#  - facility utilisation = sum of drawn tranches (category 'Loan to EMS') / max_facility_zar
#  - accrued interest ~ per tranche: amount * all_in_rate_pct/100 * days/365
